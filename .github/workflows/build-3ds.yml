name: Build 3DS

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compile with devkitPro
        run: |
          rm -f build.log
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            devkitpro/devkitarm:20251231 \
            bash -lc "set -o pipefail; cd /src && bash fetch-ssl.sh && make clean && make -j$(nproc) 2>&1 | tee build.log"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
