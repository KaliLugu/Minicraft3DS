name: Build 3DS
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20251231
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Compile with devkitPro
        shell: bash
        run: |
          set -o pipefail
          bash fetch-ssl.sh && make clean && make local -j$(nproc) 2>&1 | tee build.log
      - name: Upload build log
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
